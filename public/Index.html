<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imposter Game</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        input, button { padding: 15px; margin: 10px; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #2ecc71; color: white; font-weight: bold; cursor: pointer; }
        .imposter { color: #e74c3c; font-weight: bold; }
        #timer { font-size: 40px; margin: 20px; color: #f1c40f; }
        .hidden { display: none; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 2px solid #333; }
    </style>
</head>
<body>
    <h1>🕵️ Imposter Game</h1>

    <div id="screen-join">
        <input type="text" id="name" placeholder="Name"><br>
        <input type="text" id="room" placeholder="Raum-Code"><br>
        <button onclick="join()">Beitreten</button>
    </div>

    <div id="screen-lobby" class="hidden">
        <h3>Warten auf Spieler...</h3>
        <p id="playerList"></p>
        <button onclick="start()">Spiel starten</button>
    </div>

    <div id="screen-game" class="hidden">
        <div class="card">
            <h2 id="roleText">Deine Rolle</h2>
            <h1 id="infoText">---</h1>
        </div>
        <div id="timer">05:00</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myRoom = "";

        function join() {
            const name = document.getElementById('name').value;
            myRoom = document.getElementById('room').value;
            if(name && myRoom) {
                socket.emit('join', { name, room: myRoom });
                document.getElementById('screen-join').classList.add('hidden');
                document.getElementById('screen-lobby').classList.remove('hidden');
            }
        }

        function start() {
            socket.emit('startGame', myRoom);
        }

        socket.on('updatePlayers', (players) => {
            document.getElementById('playerList').innerText = "Dabei: " + players.map(p => p.name).join(', ');
        });

        socket.on('role', (data) => {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            const roleEl = document.getElementById('roleText');
            roleEl.innerText = data.role === "IMPOSTER" ? "DU BIST DER IMPOSTER" : "DU BIST UNSCHULDIG";
            if(data.role === "IMPOSTER") roleEl.classList.add('imposter');
            document.getElementById('infoText').innerText = data.info;
        });

        socket.on('timerStart', () => {
            let time = 300;
            const timerEl = document.getElementById('timer');
            setInterval(() => {
                let m = Math.floor(time / 60);
                let s = time % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (time > 0) time--;
            }, 1000);
        });
    </script>
</body>
</html>
